name: pipeline

on:
   push:
     branches:[ main ]

jobs:
  build:
    runs-on: ubuntu-latest
  
  steps:
    - name: checkout-code
      uses: actions/checkout@5

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with: 
            node-version@18
    
    - name: Install dependencies
      run: npm Install

    - name: Run tests
      run: npm test
